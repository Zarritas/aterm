# Release pipeline — builds the native app as `.deb` and the VS Code
# extension as `.vsix` for every supported platform, then attaches all the
# artefacts to a GitHub Release.
#
# Triggers:
#   - tag push `v*` (canonical release)
#   - manual via `workflow_dispatch` (dry-run from the Actions tab; no release)
#
# Each artefact is uploaded with `actions/upload-artifact`, so manual runs
# can still download from the run summary even when no release is cut.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Debian packages (.deb) ──────────────────────────────────────────────
  build-deb:
    name: deb · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.target }}

      - name: System deps (egui/eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libxkbcommon-dev libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libfontconfig1-dev libxkbcommon-x11-dev \
            libssl-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p aterm
          cargo build --release --target ${{ matrix.target }} -p agent-sessions-cli

      - name: Package .deb
        run: |
          # cargo-deb rewrites the `target/release/...` asset paths to the
          # per-target dir automatically when `--target` is set.
          cargo deb -p aterm --no-build --target ${{ matrix.target }}

      - name: Rename for clarity
        run: |
          shopt -s nullglob
          for f in target/${{ matrix.target }}/debian/*.deb; do
            base=$(basename "$f" .deb)
            mv "$f" "target/${{ matrix.target }}/debian/${base}_${{ matrix.arch }}.deb"
          done
          ls -la target/${{ matrix.target }}/debian/

      - uses: actions/upload-artifact@v4
        with:
          name: aterm-${{ matrix.arch }}-deb
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # ── VS Code extension (.vsix) ───────────────────────────────────────────
  build-vsix:
    name: vsix · ${{ matrix.vsce }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            vsce: linux-x64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            vsce: linux-arm64
          # darwin-x64 cross-compila desde Apple Silicon (macos-14); los runners
          # macos-13 Intel escasean y se quedan colgados en cola.
          - os: macos-14
            target: x86_64-apple-darwin
            vsce: darwin-x64
          - os: macos-14
            target: aarch64-apple-darwin
            vsce: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            vsce: win32-x64
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: vsix-${{ matrix.vsce }}

      - name: npm install
        working-directory: vscode-extension
        run: npm ci

      - name: Build .vsix (POSIX)
        if: runner.os != 'Windows'
        working-directory: vscode-extension
        run: bash scripts/build-vsix.sh ${{ matrix.vsce }}

      - name: Build .vsix (Windows)
        if: runner.os == 'Windows'
        shell: bash
        working-directory: vscode-extension
        run: |
          # The bash script works fine under git-bash on the Windows runner —
          # it shells out to cargo + vsce which both run natively.
          bash scripts/build-vsix.sh ${{ matrix.vsce }}

      - uses: actions/upload-artifact@v4
        with:
          name: agent-sessions-${{ matrix.vsce }}-vsix
          path: vscode-extension/*.vsix
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-deb, build-vsix]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artefacts
        run: |
          mkdir -p out
          find artifacts -type f \( -name '*.deb' -o -name '*.vsix' \) \
            -exec mv {} out/ \;
          ls -la out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true

  # ── Open VSX (open marketplace para forks de VS Code) ───────────────────
  # Publica un .vsix por plataforma. Se ejecuta solo en push de tag y solo si
  # el secret OVSX_PAT está configurado; sin él es un no-op (no rompe el run).
  publish-openvsx:
    name: Publish to Open VSX
    needs: build-vsix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          path: vsix
          pattern: agent-sessions-*-vsix

      - name: Publish each platform .vsix
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          if [ -z "$OVSX_PAT" ]; then
            echo "OVSX_PAT no configurado → omito la publicación en Open VSX." >&2
            exit 0
          fi
          # Idempotente: si el namespace ya existe, ignora el error.
          npx --yes ovsx create-namespace Zarritas -p "$OVSX_PAT" || true
          shopt -s globstar nullglob
          published=0
          for f in vsix/**/*.vsix; do
            echo "→ Publicando $f"
            npx --yes ovsx publish "$f" -p "$OVSX_PAT"
            published=$((published + 1))
          done
          if [ "$published" -eq 0 ]; then
            echo "No se encontró ningún .vsix para publicar." >&2
            exit 1
          fi

  # ── Visual Studio Marketplace (Microsoft) ───────────────────────────────
  # Publica un .vsix por plataforma con vsce. Solo en push de tag y solo si el
  # secret VSCE_PAT (Azure DevOps PAT con scope Marketplace > Manage) existe;
  # sin él es un no-op.
  publish-vsce:
    name: Publish to VS Marketplace
    needs: build-vsix
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/download-artifact@v4
        with:
          path: vsix
          pattern: agent-sessions-*-vsix

      - name: Publish each platform .vsix
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          if [ -z "$VSCE_PAT" ]; then
            echo "VSCE_PAT no configurado → omito la publicación en VS Marketplace." >&2
            exit 0
          fi
          shopt -s globstar nullglob
          published=0
          for f in vsix/**/*.vsix; do
            echo "→ Publicando $f"
            npx --yes @vscode/vsce publish --packagePath "$f" -p "$VSCE_PAT"
            published=$((published + 1))
          done
          if [ "$published" -eq 0 ]; then
            echo "No se encontró ningún .vsix para publicar." >&2
            exit 1
          fi

# Release de la app nativa — construye `aterm` (+ el sidecar `agent-sessions-cli`)
# como `.deb` para cada arquitectura Linux y adjunta los paquetes a una GitHub
# Release.
#
# NOTA: el `.vsix` de la extensión de VS Code YA NO se construye aquí. La
# extensión vive en su propio repo (Aterm-labs/agent-sessions), que tiene su
# propio release.yml con la matriz multiplataforma y la publicación en los
# marketplaces. Este workflow se quedó solo con el paquete nativo.
#
# Triggers:
#   - push de tag `v*` (release canónico)
#   - manual vía `workflow_dispatch` (dry-run desde la pestaña Actions; sin release)

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ── Paquetes Debian (.deb) ──────────────────────────────────────────────
  build-deb:
    name: deb · ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            arch: amd64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: deb-${{ matrix.target }}

      - name: System deps (egui/eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libxkbcommon-dev libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libfontconfig1-dev libxkbcommon-x11-dev \
            libssl-dev

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked

      - name: Build release binaries
        run: |
          cargo build --release --target ${{ matrix.target }} -p aterm
          cargo build --release --target ${{ matrix.target }} -p agent-sessions-cli

      - name: Package .deb
        run: |
          # cargo-deb reescribe las rutas `target/release/...` al dir por-target
          # automáticamente cuando se pasa `--target`.
          cargo deb -p aterm --no-build --target ${{ matrix.target }}

      - name: Rename for clarity
        run: |
          shopt -s nullglob
          for f in target/${{ matrix.target }}/debian/*.deb; do
            base=$(basename "$f" .deb)
            mv "$f" "target/${{ matrix.target }}/debian/${base}_${{ matrix.arch }}.deb"
          done
          ls -la target/${{ matrix.target }}/debian/

      - uses: actions/upload-artifact@v4
        with:
          name: aterm-${{ matrix.arch }}-deb
          path: target/${{ matrix.target }}/debian/*.deb
          if-no-files-found: error

  # ── GitHub Release ──────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: [build-deb]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artefacts
        run: |
          mkdir -p out
          find artifacts -type f -name '*.deb' -exec mv {} out/ \;
          ls -la out/

      - uses: softprops/action-gh-release@v2
        with:
          files: out/*
          generate_release_notes: true
          fail_on_unmatched_files: true

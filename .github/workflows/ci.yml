# CI — valida el workspace Cargo en cada push/PR: check, tests y clippy.
# El binario nativo (egui/eframe) necesita las libs de X11/Wayland/GL/fontconfig.
#
# clippy es informativo (no bloquea): el crate `agent-sessions` es un vendor
# verbatim de warp_agent_history y no perseguimos sus lints. check + test sí
# bloquean.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: check · test · clippy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: System deps (egui/eframe)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config libxkbcommon-dev libwayland-dev \
            libxcb1-dev libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libgl1-mesa-dev libfontconfig1-dev libxkbcommon-x11-dev \
            libssl-dev

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy (informativo)
        run: cargo clippy --workspace --all-targets || true

<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy" content="__CSP__" />
    <link rel="stylesheet" href="__STYLE__" />
    <title>Agent Sessions</title>
  </head>
  <body>
    <header class="toolbar">
      <div class="toolbar-row toolbar-search">
        <div class="search">
          <svg class="icon" viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M11.5 7a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Zm-.82 4.74a6 6 0 1 1 1.06-1.06l3.04 3.04-1.06 1.06-3.04-3.04Z"
            />
          </svg>
          <input
            id="filter"
            type="search"
            placeholder="Filtrar… p. ej. provider:claude cost>5 #wip"
            title="Texto libre · provider:claude · model:opus · cwd:aterm · branch:main · #tag · cost>5 · tokens>100000 · ctx>60 · age<7 · has:notes · has:favorite · active:true"
            autocomplete="off"
            spellcheck="false"
          />
          <button id="clear-filter" class="icon-btn" title="Limpiar filtro" hidden>
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                fill="currentColor"
                d="m8 9.06 3.47 3.47 1.06-1.06L9.06 8l3.47-3.47-1.06-1.06L8 6.94 4.53 3.47 3.47 4.53 6.94 8l-3.47 3.47 1.06 1.06L8 9.06Z"
              />
            </svg>
          </button>
        </div>
      </div>
      <div class="toolbar-row toolbar-actions">
        <div class="quick-filters" aria-label="Filtros rápidos">
          <button id="qf-active" class="icon-btn" title="Solo sesiones activas" aria-pressed="false">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                fill="currentColor"
                d="M8 4a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm0-3a7 7 0 1 0 0 14A7 7 0 0 0 8 1Zm0 1.5a5.5 5.5 0 1 1 0 11 5.5 5.5 0 0 1 0-11Z"
              />
            </svg>
          </button>
          <div class="tag-filter">
            <button id="qf-tags" class="icon-btn" title="Filtrar por etiqueta" aria-haspopup="true" aria-expanded="false">
              <svg viewBox="0 0 16 16" aria-hidden="true">
                <path
                  fill="currentColor"
                  d="M2 2h5.17a2 2 0 0 1 1.42.59l5.83 5.82a2 2 0 0 1 0 2.83l-3.17 3.17a2 2 0 0 1-2.83 0L2.6 8.59A2 2 0 0 1 2 7.17V2Zm3 3.5A1.5 1.5 0 1 0 5 2.5a1.5 1.5 0 0 0 0 3Z"
                />
              </svg>
            </button>
            <div id="tag-menu" class="tag-menu" role="menu" hidden></div>
          </div>
        </div>
        <div class="group-toggle" role="radiogroup" aria-label="Agrupar por">
          <button data-group="provider" role="radio" title="Por proveedor">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                fill="currentColor"
                d="M2 2h12v4H2V2Zm0 5h12v4H2V7Zm0 5h12v3H2v-3Zm10-9H4v2h8V3ZM4 8v2h8V8H4Zm0 5v1h8v-1H4Z"
              />
            </svg>
          </button>
          <button data-group="project" role="radio" title="Por proyecto">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                fill="currentColor"
                d="M1.5 3a.5.5 0 0 1 .5-.5h4.41l1 1H14a.5.5 0 0 1 .5.5v8.5A1.5 1.5 0 0 1 13 14H3a1.5 1.5 0 0 1-1.5-1.5V3Z"
              />
            </svg>
          </button>
          <button data-group="cascade" role="radio" title="Cascada">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                fill="currentColor"
                d="M2 3h5v1.5H2V3Zm3 4h5v1.5H5V7Zm3 4h5v1.5H8V11Z"
              />
            </svg>
          </button>
          <button data-group="date" role="radio" title="Por fecha">
            <svg viewBox="0 0 16 16" aria-hidden="true">
              <path
                fill="currentColor"
                d="M3 2v1H2v11h12V3h-1V2h-1v1H4V2H3Zm0 3h10v2H3V5Zm0 3h10v5H3V8Z"
              />
            </svg>
          </button>
        </div>
        <div class="toolbar-spacer"></div>
        <button id="action-collapse" class="icon-btn" title="Plegar / desplegar todas las secciones">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M2 3h12v1.6H2V3Zm0 8.4h12V13H2v-1.6ZM8 5.2l3 3H5l3-3Z"
            />
          </svg>
        </button>
        <button id="action-import" class="icon-btn" title="Importar .zip…">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 1.5 4.5 5h2.25v5.25H9.25V5h2.25L8 1.5ZM2 12.25V14h12v-1.75H2Z"
            />
          </svg>
        </button>
        <button id="action-new" class="icon-btn" title="Nueva sesión">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M8 2v5H3v2h5v5h2V9h5V7h-5V2H8Z"
            />
          </svg>
        </button>
        <button id="action-stats" class="icon-btn" title="Estadísticas">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M2 13V2h1.5v11H2Zm3-3V5h1.5v5H5Zm3 3V7h1.5v6H8Zm3-1V3h1.5v9H11Zm-9 2h12v1H2v-1Z"
            />
          </svg>
        </button>
        <button id="action-refresh" class="icon-btn" title="Refrescar">
          <svg viewBox="0 0 16 16" aria-hidden="true">
            <path
              fill="currentColor"
              d="M4.5 4.5a5 5 0 0 1 8.5 3.5h1.5A6.5 6.5 0 0 0 3.5 3.5L2 2v4h4L4.5 4.5ZM11.5 11.5a5 5 0 0 1-8.5-3.5H1.5a6.5 6.5 0 0 0 11 4.5L14 14v-4h-4l1.5 1.5Z"
            />
          </svg>
        </button>
      </div>
    </header>
    <main id="tree" tabindex="0" aria-label="Sesiones de agentes"></main>
    <section id="stats" class="stats" hidden aria-label="Estadísticas"></section>
    <div id="empty" class="empty" hidden>
      <p>No se encontraron sesiones.</p>
      <p class="hint">
        Comprueba que el sidecar está disponible y que has usado algún agente
        (Claude Code, Codex, OpenCode, Gemini).
      </p>
      <button id="empty-refresh" class="primary">Refrescar</button>
    </div>
    <script src="__SCRIPT__"></script>
  </body>
</html>
